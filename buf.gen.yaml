version: v2
plugins:
  # Generate standard Go Protobuf structs
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt: paths=source_relative

  # Generate ConnectRPC Go handlers/clients
  - remote: buf.build/connectrpc/go
    out: gen/go
    opt: paths=source_relative

  # 1. Standard JavaScript Generation (Messages + Connect v2 Services)
  # This replaces both protocolbuffers/js and connectrpc/js
  - remote: buf.build/bufbuild/es:v2.11.0
    out: gen/js
    opt: 
      - target=js+dts

  # Generate OpenAPI v3 Spec
  - remote: buf.build/community/sudorandom-connect-openapi
    out: gen/openapi
    opt:
      - format=yaml
      - path=civil-openapi.yaml # Point it all to one path to ensure that it generates one OpenAPI spec, but this is overridden in the CICD pipeline to allow for generating one spec for interal and one for public
      # In v0.25+, it's recommended to explicitly enable the features you're using
      - features=connectrpc;google.api.http;gnostic;protovalidate
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/civil-labs/civil-api-go
  disable:
    - file_option: go_package
      module: buf.build/bufbuild/protovalidate
    - file_option: go_package
      module: buf.build/gnostic/gnostic
    - file_option: go_package
      module: buf.build/googleapis/googleapis
syntax = "proto3";

package civil.mesh.parcels.v1;

import "buf/validate/validate.proto";
// import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/struct.proto";

service ParcelsService {
  // Retrieves the value for a specified attribute for a given parcel
  rpc GetParcelAttribute(GetParcelAttributeRequest) returns (GetParcelAttributeResponse) {}

  // Retrieves the value for a specified property for a given parcel
  rpc GetParcelProperty(GetParcelPropertyRequest) returns (GetParcelPropertyResponse) {}

  // Retrieves all of a specified parcel's attributes as an object.
  rpc GetParcel(GetParcelRequest) returns (GetParcelResponse) {}

  // Retrieves specificied attributes about a parcel as an object.
  rpc GetParcelAttributes(GetParcelAttributesRequest) returns (GetParcelAttributesResponse) {}

  // Retrieves a set of summary statistics about the specified numerical attribute for a specified list of parcels. Optionally returns the values as well
  rpc GetNumericalStats(GetNumericalStatsRequest) returns (GetNumericalStatsResponse) {}

  // Retrieves a set of summary statistics about the specified categorical attribute for a specified list of parcels. Optionally returns the values as well
  rpc GetCategoricalStats(GetCategoricalStatsRequest) returns (GetCategoricalStatsResponse) {}

  // Updates a specified attribute for one or more parcels, identified by their parcel IDs.
  rpc UpdateParcelsAttribute(UpdateParcelsAttributeRequest) returns (UpdateParcelsAttributeResponse) {}
}

message GetParcelAttributeRequest {
  string parcel_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];

  string attribute_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 63
  }];
}

message GetParcelAttributeResponse {
  string attribute_value = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];
}

message GetParcelPropertyRequest {
  string parcel_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];

  string property_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 63
  }];
}

message GetParcelPropertyResponse {
  string property_value = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];
}

message GetParcelRequest {
  string parcel_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];
}

message GetParcelResponse {
  string parcel_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];

  float parcel_area_sq_m

  string parcel_owner
}

message GetParcelAttributesRequest {
  string parcel_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];

  repeated string attribute_names = 2 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 100
    items: {
      string: {
        min_len: 1
        max_len: 63
      }
    }
  }];
}

message GetParcelAttributesResponse {
  google.protobuf.Struct parcel_attributes = 1;
}

message GetNumericalStatsRequest {
  repeated string parcel_ids = 1 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 1000
    items: {
      string: {
        min_len: 1
        max_len: 256
      }
    }
  }];

  string attribute_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 63
  }];

  bool return_values = 3 [(buf.validate.field).bool = {}];
}

message GetNumericalStatsResponse {
  float mode = 1 [(buf.validate.field).float = {}];
  float minimum = 2 [(buf.validate.field).float = {}];
  float maximum = 3 [(buf.validate.field).float = {}];
  float range = 4 [(buf.validate.field).float = {}];

  float percentile_10 = 5 [(buf.validate.field).float.finite = true];
  float percentile_20 = 6 [(buf.validate.field).float.finite = true];
  float percentile_30 = 7 [(buf.validate.field).float.finite = true];
  float percentile_40 = 8 [(buf.validate.field).float.finite = true];
  float percentile_50 = 9 [(buf.validate.field).float.finite = true];
  float percentile_60 = 10 [(buf.validate.field).float.finite = true];
  float percentile_70 = 11 [(buf.validate.field).float.finite = true];
  float percentile_80 = 12 [(buf.validate.field).float.finite = true];
  float percentile_90 = 13 [(buf.validate.field).float.finite = true];
  float percentile_100 = 14 [(buf.validate.field).float.finite = true];

  option (buf.validate.message).cel = {
    id: "percentile_ordering"
    message: "Percentiles must be in ascending order (10 <= 20 <= ... <= 100)"
    expression:
      "this.percentile_10 <= this.percentile_20 && "
      "this.percentile_20 <= this.percentile_30 && "
      "this.percentile_30 <= this.percentile_40 && "
      "this.percentile_40 <= this.percentile_50 && "
      "this.percentile_50 <= this.percentile_60 && "
      "this.percentile_60 <= this.percentile_70 && "
      "this.percentile_70 <= this.percentile_80 && "
      "this.percentile_80 <= this.percentile_90 && "
      "this.percentile_90 <= this.percentile_100"
  };

  float mean = 15 [(buf.validate.field).float = {}];
  float standard_deviation = 16 [(buf.validate.field).float = {}];
  float coefficient_of_dispersion = 17 [(buf.validate.field).float = {}];
}

message GetCategoricalStatsRequest {
  repeated string parcel_ids = 1 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 1000
    items: {
      string: {
        min_len: 1
        max_len: 256
      }
    }
  }];

  string attribute_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 63
  }];

  bool return_values = 3 [(buf.validate.field).bool = {}];
}

message GetCategoricalStatsResponse {
  string mode = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];

  map<string, int32> unique_values = 2 [(buf.validate.field).map = {
    min_pairs: 1 // Require at least one entry (prevents empty objects)
    max_pairs: 50 // Prevent "unbounded" objects that could crash your DB

    // Validate the keys (Strings)
    keys: {
      string: {
        min_len: 1
        max_len: 256
      }
    }

    // Validate the values (Integers)
    values: {
      int32: {
        gte: 0 // Example: Ensure values are non-negative
      }
    }
  }];
}

message UpdateParcelsAttributeRequest {
  repeated string parcel_ids = 1 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 1000
    items: {
      string: {
        min_len: 1
        max_len: 256
      }
    }
  }];

  string attribute_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 63
  }];

  string attribute_value = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];
}

message UpdateParcelsAttributeResponse {}

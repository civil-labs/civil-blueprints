syntax = "proto3";

package civil.mesh.parcels.v1;

import "google/protobuf/timestamp.proto";
import "google/type/interval.proto";

service ParcelsService {
  // Retrieves the value for a specified attribute for a given parcel
  rpc GetParcelsById(GetParcelsByIdRequest) returns (GetParcelsByIdResponse) {}

  rpc UpdateParcel(UpdateParcelRequest) returns (UpdateParcelResponse) {}

  // Retrieves a set of summary statistics about the specified numerical attribute for a specified list of parcels. Optionally returns the values as well
  rpc GetNumericalParcelStatsById(GetNumericalParcelStatsByIdRequest) returns (GetNumericalParcelStatsByIdResponse) {}

  // Retrieves a set of summary statistics about the specified categorical attribute for a specified list of parcels. Optionally returns the values as well
  rpc GetCategoricalParcelStatsById(GetCategoricalParcelStatsByIdRequest) returns (GetCategoricalParcelStatsByIdResponse) {}

  rpc GetEquityComparables(GetEquityComparablesRequest) returns (GetEquityComparablesResponse) {}

  rpc GetSalesComparables(GetSalesComparablesRequest) returns (GetSalesComparablesResponse) {}
}

message ParcelAffordances {
  repeated string affordance_ids = 1;
  optional double max_far = 2;
  optional double min_lot_size_sq_ft = 3;
  optional double max_height_ft = 4;
  optional double max_dwelling_units_per_acre = 5;
  optional double max_lot_coverage_pct = 6;
}

message ParcelImprovementsSummary {
  repeated string improvement_ids = 1;
  double total_area_sq_ft = 2;
  int32 total_bathrooms = 3;
  int32 total_bedrooms = 4;
  int32 total_units = 5;
  optional int32 oldest_year_built = 6;
  optional int32 newest_year_built = 7;
  optional string weighted_average_depreciation_modifier = 8;
  optional string worst_condition_id = 9;
  optional string best_condition_id = 10;
  optional string market_improvement_value = 11;
  optional string assessed_improvement_value = 12;
}

message Parcel {
  string parcel_id = 1;
  optional string formatted_address = 2;
  optional string address_id = 3;
  optional string primary_owner_name = 4;
  optional string primary_owner_address = 5;
  repeated string party_ids = 6;
  optional string land_use_id = 7;
  optional string neighborhood_id = 8;
  optional double land_area_sq_ft = 9;
  optional double frontage_ft = 10;
  optional double depth_ft = 11;
  repeated string zoning_ids = 12;
  optional string market_land_value = 13;
  optional string assessed_land_value = 14;
  ParcelAffordances affordances = 15;
  ParcelImprovementsSummary improvement_summary = 16;
  optional string properties = 17;
}

message GetParcelsByIdRequest {
  repeated string parcel_ids = 1;
  optional google.protobuf.Timestamp legal_as_of = 2;
  optional google.protobuf.Timestamp system_as_of = 3;
  optional string valuation_id = 4;
  optional string neighborhood_definition_id = 5;
}

message GetParcelsByIdResponse {
  map<string, Parcel> parcels = 1;
}

message UpdateParcelRequest {
  string parcel_id = 1;
  optional string address_id = 2;
  optional string land_use_id = 3;
  optional double land_area_sq_ft = 4;
  optional double frontage_ft = 5;
  optional double depth_ft = 6;
  optional string properties = 7;
}

message UpdateParcelResponse {}

enum ParcelAttribute {
  PARCEL_ATTRIBUTE_UNSPECIFIED = 0;
  PARCEL_ATTRIBUTE_LAND_AREA_SQ_FT = 1;
  PARCEL_ATTRIBUTE_FRONTAGE_FT = 2;
  PARCEL_ATTRIBUTE_DEPTH_FT = 3;
  PARCEL_ATTRIBUTE_LAND_USE_ID = 4;
  PARCEL_ATTRIBUTE_ZONING_ID = 5;
  PARCEL_ATTRIBUTE_IMPROVEMENT_AREA_SQ_FT = 6;
  PARCEL_ATTRIBUTE_IMPROVEMENT_YEAR_BUILT = 7;
  PARCEL_ATTRIBUTE_IMPROVEMENT_EFFECTIVE_YEAR_BUILT = 8;
  PARCEL_ATTRIBUTE_BEDROOMS = 9;
  PARCEL_ATTRIBUTE_BATHROOMS = 10;
  PARCEL_ATTRIBUTE_UNITS = 11;
  PARCEL_ATTRIBUTE_CONDITION_ID = 12;
  PARCEL_ATTRIBUTE_IMPROVEMENT_TYPE_ID = 13;
}

message GetNumericalParcelStatsByIdRequest {
  repeated string parcel_ids = 1;
  ParcelAttribute attribute = 2;
  optional google.protobuf.Timestamp legal_as_of = 3;
  optional google.protobuf.Timestamp system_as_of = 4;
}

message GetNumericalParcelStatsByIdResponse {
  float mode = 1;
  float minimum = 2;
  float maximum = 3;
  float range = 4;

  float percentile_10 = 5;
  float percentile_20 = 6;
  float percentile_30 = 7;
  float percentile_40 = 8;
  float percentile_50 = 9;
  float percentile_60 = 10;
  float percentile_70 = 11;
  float percentile_80 = 12;
  float percentile_90 = 13;
  float percentile_100 = 14;

  float mean = 15;
  float standard_deviation = 16;
  float coefficient_of_dispersion = 17;
}

message GetCategoricalParcelStatsByIdRequest {
  repeated string parcel_ids = 1;
  ParcelAttribute attribute = 2;
  optional google.protobuf.Timestamp legal_as_of = 3;
  optional google.protobuf.Timestamp system_as_of = 4;
}

message GetCategoricalParcelStatsByIdResponse {
  string mode = 1;

  map<string, int32> unique_values = 2;
}

message ComparableCriteria {
  ParcelAttribute attribute = 1;
  optional double min_numerical_tolerance = 2;
  optional double max_numerical_tolerance = 3;
  repeated string categorical_tolerance = 4;
}

message ComparableAttribute {
  ParcelAttribute attribute = 1;
  optional double numerical_value = 2;
  optional string categorical_value = 3;
}

message EquityComparableParcel {
  string parcel_id = 1;
  string address_id = 2;
  string formatted_address = 3;
  repeated ComparableAttribute attributes = 4;
}

message SaleComparableParcel {
  string parcel_id = 1;
  string address_id = 2;
  string formatted_address = 3;
  google.protobuf.Timestamp sale_time = 4;
  string sale_price = 5;
  repeated ComparableAttribute attributes = 6;
}

message GetEquityComparablesRequest {
  string wkt_polygon = 1;
  repeated ComparableCriteria criteria = 2;
  repeated string selected_parcel_ids = 3;
}

message GetEquityComparablesResponse {
  map<string, EquityComparableParcel> parcels = 1;
}

message GetSalesComparablesRequest {
  string wkt_polygon = 1;
  repeated ComparableCriteria criteria = 2;
  repeated string selected_parcel_ids = 3;
  google.type.Interval time_range = 4;
}

message GetSalesComparablesResponse {
  map<string, SaleComparableParcel> parcels = 1;
}

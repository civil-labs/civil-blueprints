syntax = "proto3";

package civil.public.landuses.v1;

service LandUsesService {
  rpc GetLandUses(GetLandUsesRequest) returns (GetLandUsesResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  rpc GetLandUseTypes(GetLandUseTypesRequest) returns (GetLandUseTypesResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
}

message LandUse {
  string id = 1;
  string name = 2;
  string code = 3;
  string description = 4;
  string land_use_type_id = 5;
  string land_use_type_name = 6;
}

message GetLandUsesRequest {}

message GetLandUsesResponse {
  map<string, LandUse> land_uses = 1;
}

message LandUseType {
  string id = 1;
  string name = 2;
  string code = 3;
  string description = 4;
}

message GetLandUseTypesRequest {}

message GetLandUseTypesResponse {
  map<string, LandUseType> land_use_types = 1;
}

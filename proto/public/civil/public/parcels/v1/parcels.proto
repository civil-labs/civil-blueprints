message GetCategoricalParcelAttributeStatsByIdResponse {
  string mode = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];

  map<string, int32> unique_values = 2 [(buf.validate.field).map = {
    min_pairs: 1 // Require at least one entry (prevents empty objects)

    max_pairs: 50 // Prevent "unbounded" objects that could crash your DB

    // Validate the keys (Strings)
    keys: {
      string: {
        min_len: 1
        max_len: 256
      }
    }

    // Validate the values (Integers)
    values: {
      int32: {
        gte: 0 // Example: Ensure values are non-negative
      }
    }
  }];
}

message ComparableCriteria {
  ParcelAttribute attribute = 1;
  optional double min_numerical_tolerance = 2;
  optional double max_numerical_tolerance = 3;
  repeated string categorical_tolerance = 4;
}

message ComparableAttribute {
  ParcelAttribute attribute = 1;
  optional double numerical_value = 2;
  optional string categorical_value = 3;
}

message EquityComparableParcel {
  string parcel_id = 1;
  int64 feature_id = 2;
  string address_id = 3;
  string formatted_address = 4;
  repeated ComparableAttribute attributes = 5;
}

message SaleComparableParcel {
  string parcel_id = 1;
  int64 feature_id = 2;
  string address_id = 3;
  string formatted_address = 4;
  google.protobuf.Timestamp sale_time = 5;
  string sale_price = 6;
  repeated ComparableAttribute attributes = 7;
}

message GetEquityComparablesRequest {
  string wkt_polygon = 1 [(buf.validate.field).string = {
    // This regex ensures it starts with a valid WKT type and contains parentheses
    pattern: "^(?i)(POINT|LINESTRING|POLYGON|MULTIPOINT|MULTILINESTRING|MULTIPOLYGON|GEOMETRYCOLLECTION)\\s*(Z|M|ZM)?\\s*\\(.*\\)$"
    max_len: 10000
  }];

  repeated ComparableCriteria criteria = 2;

  repeated string selected_parcel_ids = 3;
}

message GetEquityComparablesResponse {
  map<string, EquityComparableParcel> parcels = 1;
}

message GetSalesComparablesRequest {
  string wkt_polygon = 1 [(buf.validate.field).string = {
    // This regex ensures it starts with a valid WKT type and contains parentheses
    pattern: "^(?i)(POINT|LINESTRING|POLYGON|MULTIPOINT|MULTILINESTRING|MULTIPOLYGON|GEOMETRYCOLLECTION)\\s*(Z|M|ZM)?\\s*\\(.*\\)$"
    max_len: 10000
  }];

  repeated ComparableCriteria criteria = 2;

  repeated string selected_parcel_ids = 3;

  google.type.Interval time_range = 4 [(buf.validate.field).cel = {
    id: "valid_time_range"
    message: "start_time must be before end_time"
    // Ensures the start is strictly before the end, assuming both are provided
    expression: "!has(this.start_time) || !has(this.end_time) || this.start_time < this.end_time"
  }];
}

message GetSalesComparablesResponse {
  map<string, SaleComparableParcel> parcels = 1;
}

message GetParcelIdsByFeatureIdRequest {
  repeated int64 feature_ids = 1;
}

message GetParcelIdsByFeatureIdResponse {
  map<int64, string> parcel_ids = 1;
}

message GetEstimatedParcelsExtentWGS84Request {}

message GetEstimatedParcelsExtentWGS84Response {
  double min_x = 1 [(gnostic.openapi.v3.property) = {description: "Minimum Longitude / West"}];
  double min_y = 2 [(gnostic.openapi.v3.property) = {description: "Minimum Latitude / South"}];
  double max_x = 3 [(gnostic.openapi.v3.property) = {description: "Maximum Longitude / East"}];
  double max_y = 4 [(gnostic.openapi.v3.property) = {description: "Maximum Latitude / North"}];
}

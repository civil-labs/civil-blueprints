syntax = "proto3";

package civil.public.parcels.v1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/type/interval.proto";

//option go_package = "github.com/civil-labs/civil-api-go/civil/parcels/v1;parcelsv1";
option (gnostic.openapi.v3.document) = {
  info: {
    title: "Civil API"
    version: "0.0.0"
    description: "Public API description for the Civil platform. Auth token can be retrieved by prefixing \"auth-\" to the beginning of your jurisdiction's endpoint."
  }

  components: {
    security_schemes: {
      additional_properties: [
        {
          name: "BearerAuth"
          value: {
            security_scheme: {
              type: "http"
              scheme: "bearer"
              bearer_format: "JWT"
            }
          }
        }
      ]
    }
  }

  servers: [
    {url: "https://leepa.civillabs.app"},
    {url: "https://louisville.civillabs.app"}]
};

service ParcelsService {
  // Retrieves all of a specified parcel's attributes as an object.
  rpc GetParcelsWithImprovementSummaryByParcelId(GetParcelsWithImprovementSummaryByParcelIdRequest) returns (GetParcelsWithImprovementSummaryByParcelIdResponse) {}

  rpc UpdateParcel(UpdateParcelRequest) returns (UpdateParcelResponse) {}

  // Retrieves a set of summary statistics about the specified numerical attribute for a specified list of parcels. Optionally returns the values as well
  rpc GetNumericalParcelAttributeStatsById(GetNumericalParcelAttributeStatsByIdRequest) returns (GetNumericalParcelAttributeStatsByIdResponse) {}

  // Retrieves a set of summary statistics about the specified categorical attribute for a specified list of parcels. Optionally returns the values as well
  rpc GetCategoricalParcelAttributeStatsById(GetCategoricalParcelAttributeStatsByIdRequest) returns (GetCategoricalParcelAttributeStatsByIdResponse) {}

  rpc GetEquityComparables(GetEquityComparablesRequest) returns (GetEquityComparablesResponse) {}

  rpc GetSalesComparables(GetSalesComparablesRequest) returns (GetSalesComparablesResponse) {}

  rpc GetParcelsWithImprovementSummaryByFeatureId(GetParcelsWithImprovementSummaryByFeatureIdRequest) returns (GetParcelsWithImprovementSummaryByFeatureIdResponse) {}

  rpc GetParcelIdsByFeatureId(GetParcelIdsByFeatureIdRequest) returns (GetParcelIdsByFeatureIdResponse) {}

  rpc GetEstimatedParcelsExtentWGS84(GetEstimatedParcelsExtentWGS84Request) returns (GetEstimatedParcelsExtentWGS84Response) {}
}

message ParcelAffordances {
  repeated string affordance_ids = 1 [
    (buf.validate.field).repeated = {
      // Communicate all will be unique
      unique: true

      // A single parcel will rarely have more than a
      // handful of affordances
      max_items: 50

      // Communicate all are UUIDs
      items: {
        string: {uuid: true}
      }
    },
    // Gnostic annotation updated to reflect an array format for the example
    (gnostic.openapi.v3.property) = {
      description: "A list of unique identifiers for the affordances on the parcel."
      example: {yaml: "['d25f625b-4e82-4761-82ca-10dafc5dcf77', 'a11c834a-9f12-4852-9bca-32dabc5def88']"}
    }
  ];

  // Maximum Floor Area Ratio (FAR)
  optional double max_far = 2 [(buf.validate.field).double = {gte: 0.0}];

  // Minimum lot size in square feet
  optional double min_lot_size_sq_ft = 3 [(buf.validate.field).double = {gte: 0.0}];

  // Maximum legally permitted building height in feet
  optional double max_height_ft = 4 [(buf.validate.field).double = {gte: 0.0}];

  optional double max_dwelling_units_per_acre = 5 [(buf.validate.field).double = {gte: 0.0}];

  optional double max_lot_coverage_pct = 6 [(buf.validate.field).double = {gte: 0.0}];
}

message ParcelImprovementsSummary {
  repeated string improvement_ids = 1 [
    (buf.validate.field).repeated = {
      // Communicate all will be unique
      unique: true

      // A single parcel will rarely have more than a
      // handful of improvements (e.g., House, Garage, Shed, Pool).
      max_items: 50

      // Communicate all are UUIDs
      items: {
        string: {uuid: true}
      }
    },
    // Gnostic annotation updated to reflect an array format for the example
    (gnostic.openapi.v3.property) = {
      description: "A list of unique identifiers for the improvements on the parcel."
      example: {yaml: "['d25f625b-4e82-4761-82ca-10dafc5dcf77', 'a11c834a-9f12-4852-9bca-32dabc5def88']"}
    }
  ];

  string primary_improvement_id = 2 [
    (buf.validate.field).string.uuid = true,

    (gnostic.openapi.v3.property) = {
      description: "The ID of the primary improvement on this parcel"
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];

  // Physically impossible to be negative
  double total_area_sq_ft = 3 [(buf.validate.field).double = {gte: 0.0}];

  int32 total_bathrooms = 4 [(buf.validate.field).int32 = {gte: 0}];

  int32 total_bedrooms = 5 [(buf.validate.field).int32 = {gte: 0}];

  int32 total_units = 6 [(buf.validate.field).int32 = {gte: 0}];

  optional int32 primary_year_built = 7 [(buf.validate.field).int32 = {}];

  optional string primary_condition_id = 8 [
    (buf.validate.field).string.uuid = true,

    (gnostic.openapi.v3.property) = {
      description: "The ID of the condition of the primary improvement on this parcel"
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];

  optional string total_market_improvement_value = 9 [
    (buf.validate.field).string = {
      // Strictly caps digits to 15 before the decimal, and up to 4 after. Matches the source DB column, which is numeric(19,4)
      pattern: "^-?[0-9]{1,15}(\\.[0-9]{1,4})?$"
    },
    (gnostic.openapi.v3.property) = {description: "Is only returned if a valuation_id is provided which contains a valuation for improvements attached to this parcel"}
  ];

  optional string total_assessed_improvement_value = 10 [
    (buf.validate.field).string = {
      // Strictly caps digits to 15 before the decimal, and up to 4 after. Matches the source DB column, which is numeric(19,4)
      pattern: "^-?[0-9]{1,15}(\\.[0-9]{1,4})?$"
    },
    (gnostic.openapi.v3.property) = {description: "Is only returned if a valuation_id is provided which contains a valuation for improvements attached to this parcel"}
  ];
}

message ParcelDetails {
  string parcel_id = 1 [
    (buf.validate.field).string.uuid = true,

    // Gnostic annotation for example
    (gnostic.openapi.v3.property) = {
      description: "The unique identifier for the parcel."
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];

  optional int64 feature_id = 2;

  optional string formatted_address = 3 [(buf.validate.field).string = {
    min_len: 0
    max_len: 256
  }];

  optional string address_id = 4 [
    (buf.validate.field).string.uuid = true,

    // Gnostic annotation for example
    (gnostic.openapi.v3.property) = {
      description: "The unique identifier for the parcel's address."
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];

  optional string primary_owner_name = 5 [(buf.validate.field).string = {
    min_len: 0
    max_len: 128
  }];

  optional string primary_owner_address = 6 [(buf.validate.field).string = {
    min_len: 0
    max_len: 256
  }];

  repeated string party_ids = 7 [
    (buf.validate.field).repeated = {
      // Communicate all will be unique
      unique: true

      // A single parcel will rarely have more than a
      // handful of owners
      max_items: 10

      // Communicate all are UUIDs
      items: {
        string: {uuid: true}
      }
    },
    // Gnostic annotation updated to reflect an array format for the example
    (gnostic.openapi.v3.property) = {
      description: "A list of unique identifiers for the parties that own this parcel."
      example: {yaml: "['d25f625b-4e82-4761-82ca-10dafc5dcf77', 'a11c834a-9f12-4852-9bca-32dabc5def88']"}
    }
  ];

  optional string land_use_id = 8 [
    (buf.validate.field).string.uuid = true,

    // Gnostic annotation for example
    (gnostic.openapi.v3.property) = {
      description: "The unique identifier for the parcel's land use."
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];

  optional string neighborhood_id = 9 [
    (buf.validate.field).string.uuid = true,

    // Gnostic annotation for example
    (gnostic.openapi.v3.property) = {
      description: "The unique identifier for the parcel's neighborhood. Will only populate if a neighborhood definition ID is provided, and the parcel has a neighborhood for that definition."
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];

  optional double land_area_sq_ft = 10 [(buf.validate.field).double = {gte: 0.0}];

  optional double frontage_ft = 11 [(buf.validate.field).double = {gte: 0.0}];

  optional double depth_ft = 12 [(buf.validate.field).double = {gte: 0.0}];

  repeated string zoning_ids = 13 [
    (buf.validate.field).repeated = {
      // Communicate all will be unique
      unique: true

      max_items: 50

      // Communicate all are UUIDs
      items: {
        string: {uuid: true}
      }
    },
    // Gnostic annotation updated to reflect an array format for the example
    (gnostic.openapi.v3.property) = {
      description: "A list of unique identifiers for the zoning overlays on the parcel."
      example: {yaml: "['d25f625b-4e82-4761-82ca-10dafc5dcf77', 'a11c834a-9f12-4852-9bca-32dabc5def88']"}
    }
  ];

  optional string market_land_value = 14 [
    (buf.validate.field).string = {
      // Strictly caps digits to 15 before the decimal, and up to 4 after. Matches the source DB column, which is numeric(19,4)
      pattern: "^-?[0-9]{1,15}(\\.[0-9]{1,4})?$"
    },
    (gnostic.openapi.v3.property) = {description: "Is only returned if a valuation_id is provided which contains a valuation for this parcel"}
  ];

  optional string assessed_land_value = 15 [
    (buf.validate.field).string = {
      // Strictly caps digits to 15 before the decimal, and up to 4 after. Matches the source DB column, which is numeric(19,4)
      pattern: "^-?[0-9]{1,15}(\\.[0-9]{1,4})?$"
    },
    (gnostic.openapi.v3.property) = {description: "Is only returned if a valuation_id is provided which contains a valuation for this parcel"}
  ];

  optional string properties = 16 [(buf.validate.field).string = {
    max_bytes: 5120 // 5 KB limit (5 * 1024 bytes)
  }];
}

message ParcelWithImprovementSummary {
  ParcelDetails parcel_details = 1;
  ParcelImprovementsSummary improvement_summary = 2;
}

message GetParcelsWithImprovementSummaryByParcelIdRequest {
  repeated string parcel_ids = 1 [
    (buf.validate.field).repeated = {
      // Enforce uniqueness at the API edge
      unique: true

      min_items: 1
      max_items: 100

      // Apply the uuid rule to the items in the array
      items: {
        string: {uuid: true}
      }
    },
    (gnostic.openapi.v3.property) = {
      description: "A list of unique identifiers for the parcels."
      example: {yaml: "['d25f625b-4e82-4761-82ca-10dafc5dcf77', 'a11c834a-9f12-4852-9bca-32dabc5def88']"}
    }
  ];

  optional google.protobuf.Timestamp legal_as_of = 2 [
    (buf.validate.field).timestamp = {
      // Bounded to prevent integer overflow or absurd historical queries
      gt: {seconds: -62135596800} /* Approx Jan 1, 0 CE */
    },
    (gnostic.openapi.v3.property) = {description: "The timestamp to retrieve the parcel data for. Defaults to now. If a parcel does not have data for that time, no data for that parcel is returned."}
  ];

  optional string valuation_id = 3 [
    (buf.validate.field).string.uuid = true,

    // Gnostic annotation for example
    (gnostic.openapi.v3.property) = {
      description: "The unique identifier of a valuation."
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];

  optional string neighborhood_definition_id = 4 [
    (buf.validate.field).string.uuid = true,

    // Gnostic annotation for example
    (gnostic.openapi.v3.property) = {
      description: "The unique identifier of a neighborhood definition."
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];
}

message GetParcelsWithImprovementSummaryByParcelIdResponse {
  map<string, ParcelWithImprovementSummary> parcels = 1 [(gnostic.openapi.v3.property) = {description: "A dictionary of parcels, keyed by their UUID parcel ID."}];
}

message GetParcelsWithImprovementSummaryByFeatureIdRequest {
  repeated int64 feature_ids = 1;

  optional google.protobuf.Timestamp legal_as_of = 2 [
    (buf.validate.field).timestamp = {
      // Bounded to prevent integer overflow or absurd historical queries

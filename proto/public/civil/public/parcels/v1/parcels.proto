syntax = "proto3";

package civil.public.parcels.v1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/timestamp.proto";

//option go_package = "github.com/civil-labs/civil-api-go/civil/parcels/v1;parcelsv1";
option (gnostic.openapi.v3.document) = {
  info: {
    title: "Civil API"
    version: "0.0.3"
    description: "Public API description for the Civil platform. Auth token can be retrieved by prefixing \"auth-\" to the beginning of your jurisdiction's endpoint."
  }

  components: {
    security_schemes: {
      additional_properties: [
        {
          name: "BearerAuth"
          value: {
            security_scheme: {
              type: "http"
              scheme: "bearer"
              bearer_format: "JWT"
            }
          }
        }
      ]
    }
  }

  servers: [
    {url: "https://leepa.civillabs.app"},
    {url: "https://louisville.civillabs.app"}]
};

service ParcelsService {
  // Retrieves all of a specified parcel's attributes as an object.
  rpc GetParcelsById(GetParcelsByIdRequest) returns (GetParcelsByIdResponse) {
    // Give connect the option to use GET requests, but don't advertise it in the Swagger
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  rpc UpdateParcel(UpdateParcelRequest) returns (UpdateParcelResponse) {}

  // Retrieves a set of summary statistics about the specified numerical attribute for a specified list of parcels. Optionally returns the values as well
  rpc GetNumericalParcelAttributeStatsById(GetNumericalParcelAttributeStatsByIdRequest) returns (GetNumericalParcelAttributeStatsByIdResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // Retrieves a set of summary statistics about the specified categorical attribute for a specified list of parcels. Optionally returns the values as well
  rpc GetCategoricalAttributeParcelStatsById(GetCategoricalAttributeParcelStatsByIdRequest) returns (GetCategoricalAttributeParcelStatsByIdResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
}

message ParcelAffordances {
  repeated string affordance_ids = 1 [
    (buf.validate.field).repeated = {
      // Communicate all will be unique
      unique: true

      // A single parcel will rarely have more than a
      // handful of affordances
      max_items: 50

      // Communicate all are UUIDs
      items: {
        string: {uuid: true}
      }
    },

    // Gnostic annotation updated to reflect an array format for the example
    (gnostic.openapi.v3.property) = {
      description: "A list of unique identifiers for the affordances on the parcel."
      example: {yaml: "['d25f625b-4e82-4761-82ca-10dafc5dcf77', 'a11c834a-9f12-4852-9bca-32dabc5def88']"}
    }
  ];

  // Maximum Floor Area Ratio (FAR)
  optional double max_far = 2 [(buf.validate.field).double = {gte: 0.0}];

  // Minimum lot size in square feet
  optional double min_lot_size_sq_ft = 3 [(buf.validate.field).double = {gte: 0.0}];

  // Maximum legally permitted building height in feet
  optional double max_height_ft = 4 [(buf.validate.field).double = {gte: 0.0}];
}

message ParcelImprovementsSummary {
  repeated string improvement_ids = 1 [
    (buf.validate.field).repeated = {
      // Communicate all will be unique
      unique: true

      // A single parcel will rarely have more than a
      // handful of improvements (e.g., House, Garage, Shed, Pool).
      max_items: 50

      // Communicate all are UUIDs
      items: {
        string: {uuid: true}
      }
    },

    // Gnostic annotation updated to reflect an array format for the example
    (gnostic.openapi.v3.property) = {
      description: "A list of unique identifiers for the improvements on the parcel."
      example: {yaml: "['d25f625b-4e82-4761-82ca-10dafc5dcf77', 'a11c834a-9f12-4852-9bca-32dabc5def88']"}
    }
  ];

  // Physically impossible to be negative
  double total_area_sq_ft = 2 [(buf.validate.field).double = {gte: 0.0}];

  int32 total_bathrooms = 3 [(buf.validate.field).int32 = {gte: 0}];

  int32 total_bedrooms = 4 [(buf.validate.field).int32 = {gte: 0}];

  int32 total_units = 5 [(buf.validate.field).int32 = {gte: 0}];

  // Bounded to realistic historical/future parameters
  optional int32 oldest_year_built = 6 [(buf.validate.field).int32 = {}];

  optional int32 newest_year_built = 7 [(buf.validate.field).int32 = {}];

  optional string weighted_average_depreciation_modifier = 8 [
    (buf.validate.field).string = {
        // Matches 0, 0.0000 -> 0.9999, 1, and 1.0000
        pattern: "^(0(\\.[0-9]{1,4})?|1(\\.0{1,4})?)$"
    },

    (gnostic.openapi.v3.property) = {
      description: "The average of the depreciation modifiers of the conditions of every improvement on this parcel, as weighted by their floor areas"
    }
  ];

  // Worst and best based on the conditions' depreciation factors
  optional string worst_condition_id = 9 [
    (buf.validate.field).string.uuid = true,

    // Gnostic annotation for example
    (gnostic.openapi.v3.property) = {
      description: "The worst condition of an improvement on this parcel, as sorted by their depreciation modifiers."
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];

  optional string best_condition_id = 10 [
    (buf.validate.field).string.uuid = true,

    // Gnostic annotation for example
    (gnostic.openapi.v3.property) = {
      description: "The best condition of an improvement on this parcel, as sorted by their depreciation modifiers."
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];

  optional string market_improvement_value = 11 [
    (buf.validate.field).string = {
      // Strictly caps digits to 15 before the decimal, and up to 4 after. Matches the source DB column, which is numeric(19,4)
      pattern: "^-?[0-9]{1,15}(\\.[0-9]{1,4})?$"
    },

    (gnostic.openapi.v3.property) = {description: "Is only returned if a valuation_id is provided which contains a valuation for improvements attached to this parcel"}
  ];

  optional string assessed_improvement_value = 12 [
    (buf.validate.field).string = {
      // Strictly caps digits to 15 before the decimal, and up to 4 after. Matches the source DB column, which is numeric(19,4)
      pattern: "^-?[0-9]{1,15}(\\.[0-9]{1,4})?$"
    },

    (gnostic.openapi.v3.property) = {description: "Is only returned if a valuation_id is provided which contains a valuation for improvements attached to this parcel"}
  ];
}

message Parcel {
  string parcel_id = 1 [
    (buf.validate.field).string.uuid = true,

    // Gnostic annotation for example
    (gnostic.openapi.v3.property) = {
      description: "The unique identifier for the parcel."
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];

  optional string address = 2 [(buf.validate.field).string = {
    min_len: 0
    max_len: 1024
  }];

  optional string address_id = 3 [
    (buf.validate.field).string.uuid = true,

    // Gnostic annotation for example
    (gnostic.openapi.v3.property) = {
      description: "The unique identifier for the parcel's address."
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];

  optional string owner_name = 4 [(buf.validate.field).string = {
    min_len: 0
    max_len: 512
  }];

  optional string owner_address = 5 [(buf.validate.field).string = {
    min_len: 0
    max_len: 1024
  }];

  optional string owner_id = 6 [
    (buf.validate.field).string.uuid = true,

    // Gnostic annotation for example
    (gnostic.openapi.v3.property) = {
      description: "The unique identifier for the parcel owner."
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];

  optional string land_use_id = 7 [
    (buf.validate.field).string.uuid = true,

    // Gnostic annotation for example
    (gnostic.openapi.v3.property) = {
      description: "The unique identifier for the parcel's land use."
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];

  optional string neighborhood_id = 8 [
    (buf.validate.field).string.uuid = true,

    // Gnostic annotation for example
    (gnostic.openapi.v3.property) = {
      description: "The unique identifier for the parcel's neighborhood. Will only populate if a neighborhood definition ID is provided, and the parcel has a neighborhood for that definition."
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];

  optional double land_area_sq_ft = 9 [(buf.validate.field).double = {gte: 0.0}];

  optional double frontage_ft = 10 [(buf.validate.field).double = {gte: 0.0}];

  optional double depth_ft = 11 [(buf.validate.field).double = {gte: 0.0}];

  repeated string zoning_ids = 12 [
    (buf.validate.field).repeated = {
      // Communicate all will be unique
      unique: true

      max_items: 50

      // Communicate all are UUIDs
      items: {
        string: {uuid: true}
      }
    },

    // Gnostic annotation updated to reflect an array format for the example
    (gnostic.openapi.v3.property) = {
      description: "A list of unique identifiers for the zoning overlays on the parcel."
      example: {yaml: "['d25f625b-4e82-4761-82ca-10dafc5dcf77', 'a11c834a-9f12-4852-9bca-32dabc5def88']"}
    }
  ];

  optional string market_land_value = 13 [
    (buf.validate.field).string = {
      // Strictly caps digits to 15 before the decimal, and up to 4 after. Matches the source DB column, which is numeric(19,4)
      pattern: "^-?[0-9]{1,15}(\\.[0-9]{1,4})?$"
    },

    (gnostic.openapi.v3.property) = {description: "Is only returned if a valuation_id is provided which contains a valuation for this parcel"}
  ];

  optional string assessed_land_value = 14 [
    (buf.validate.field).string = {
      // Strictly caps digits to 15 before the decimal, and up to 4 after. Matches the source DB column, which is numeric(19,4)
      pattern: "^-?[0-9]{1,15}(\\.[0-9]{1,4})?$"
    },

    (gnostic.openapi.v3.property) = {description: "Is only returned if a valuation_id is provided which contains a valuation for this parcel"}
  ];

  ParcelAffordances affordances = 15;

  ParcelImprovementsSummary improvement_summary = 16;

  optional string properties = 17 [(buf.validate.field).string = {
    max_bytes: 5120 // 5 KB limit (5 * 1024 bytes)
  }];
}

message GetParcelsByIdRequest {
  repeated string parcel_ids = 1 [
    (buf.validate.field).repeated = {
      // Enforce uniqueness at the API edge
      unique: true

      min_items: 1
      max_items: 100

      // Apply the uuid rule to the items in the array
      items: {
        string: {uuid: true}
      }
    },

    (gnostic.openapi.v3.property) = {
      description: "A list of unique identifiers for the parcels."
      example: {yaml: "['d25f625b-4e82-4761-82ca-10dafc5dcf77', 'a11c834a-9f12-4852-9bca-32dabc5def88']"}
    }
  ];

  // The historical or future effective date the user wants to view.
  // If omitted, defaults to the current time.
  optional google.protobuf.Timestamp legal_as_of = 2 [
    (buf.validate.field).timestamp = {
      // Bounded to prevent integer overflow or absurd historical queries
      gt: {seconds: -62135596800} /* Approx Jan 1, 0 CE */
    },
    (gnostic.openapi.v3.property) = {description: "The real-world date to evaluate the parcel against. Defaults to now."}
  ];

  // The time to reset the database state to
  // If omitted, defaults to the current time.
  optional google.protobuf.Timestamp system_as_of = 3 [
    (buf.validate.field).timestamp = {
      // From the Unix Epoch till now
      gt: {seconds: -1}
      lt_now: true
    },
    (gnostic.openapi.v3.property) = {description: "The transaction time to evaluate the database state against. Defaults to now."}
  ];

  optional string valuation_id = 4 [
    (buf.validate.field).string.uuid = true,

    // Gnostic annotation for example
    (gnostic.openapi.v3.property) = {
      description: "The unique identifier of a valuation."
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];

  optional string neighborhood_definition_id = 5 [
    (buf.validate.field).string.uuid = true,

    // Gnostic annotation for example
    (gnostic.openapi.v3.property) = {
      description: "The unique identifier of a neighborhood definition."
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];
}

message GetParcelsByIdResponse {
  // A map of parcel records, keyed by their public ID.
  map<string, Parcel> parcels = 1 [(gnostic.openapi.v3.property) = {description: "A dictionary of parcels, keyed by their unique parcel_id."}];
}

message UpdateParcelRequest {
  string parcel_id = 1 [
    (buf.validate.field).string.uuid = true,

    // Gnostic annotation for example
    (gnostic.openapi.v3.property) = {
      description: "The unique identifier for the parcel."
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];

  optional double land_area_sq_ft = 2 [(buf.validate.field).double = {gte: 0.0}];

  optional string market_land_value = 3 [(buf.validate.field).string = {
    // Regex enforces an optional negative sign, numbers, and up to 4 decimal places
    pattern: "^-?[0-9]+(\\.[0-9]{1,4})?$"
  }];

  optional string assessed_land_value = 4 [(buf.validate.field).string = {
    // Regex enforces an optional negative sign, numbers, and up to 4 decimal places
    pattern: "^-?[0-9]+(\\.[0-9]{1,4})?$"
  }];

  optional string address_id = 5 [
    (buf.validate.field).string.uuid = true,

    // Gnostic annotation for example
    (gnostic.openapi.v3.property) = {
      description: "The unique identifier for the parcel's address."
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];

  optional string owner_id = 6 [
    (buf.validate.field).string.uuid = true,

    // Gnostic annotation for example
    (gnostic.openapi.v3.property) = {
      description: "The unique identifier for the parcel owner."
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];

  optional string land_use_id = 7 [
    (buf.validate.field).string.uuid = true,

    // Gnostic annotation for example
    (gnostic.openapi.v3.property) = {
      description: "The unique identifier for the parcel's land use."
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];

  optional string neighborhood_id = 8 [
    (buf.validate.field).string.uuid = true,

    // Gnostic annotation for example
    (gnostic.openapi.v3.property) = {
      description: "The unique identifier for the parcel's neighborhood."
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];

  optional string market_area_id = 9 [
    (buf.validate.field).string.uuid = true,

    // Gnostic annotation for example
    (gnostic.openapi.v3.property) = {
      description: "The unique identifier for the parcel's market area."
      example: {yaml: "'d25f625b-4e82-4761-82ca-10dafc5dcf77'"}
    }
  ];
}

message UpdateParcelResponse {}

enum ParcelAttribute {
  PARCEL_ATTRIBUTE_UNSPECIFIED = 0;
  PARCEL_ATTRIBUTE_LAND_AREA_SQ_FT = 1;
  PARCEL_ATTRIBUTE_FRONTAGE_FT = 2;
  PARCEL_ATTRIBUTE_DEPTH_FT = 3;
  PARCEL_ATTRIBUTE_LAND_USE_ID = 4;
}

message GetNumericalParcelAttributeStatsByIdRequest {
  repeated string parcel_ids = 1 [
    (buf.validate.field).repeated = {
      // Enforce uniqueness at the API edge
      unique: true

      min_items: 1
      max_items: 1000

      // Apply the uuid rule to the items in the array
      items: {
        string: {uuid: true}
      }
    },

    (gnostic.openapi.v3.property) = {
      description: "A list of unique identifiers for the parcels."
      example: {yaml: "['d25f625b-4e82-4761-82ca-10dafc5dcf77', 'a11c834a-9f12-4852-9bca-32dabc5def88']"}
    }
  ];

  ParcelAttribute attribute = 2 [(buf.validate.field).enum = {
    defined_only: true,
    in: [1, 2, 3]
  }];

  // The historical or future effective date the user wants to view.
  // If omitted, defaults to the current time.
  optional google.protobuf.Timestamp legal_as_of = 3 [
    (buf.validate.field).timestamp = {
      // Bounded to prevent integer overflow or absurd historical queries
      gt: {seconds: -62135596800} /* Approx Jan 1, 0 CE */
    },
    (gnostic.openapi.v3.property) = {description: "The real-world date to evaluate the parcel against. Defaults to now."}
  ];

  // The time to reset the database state to
  // If omitted, defaults to the current time.
  optional google.protobuf.Timestamp system_as_of = 4 [
    (buf.validate.field).timestamp = {
      // From the Unix Epoch till now
      gt: {seconds: -1}
      lt_now: true
    },
    (gnostic.openapi.v3.property) = {description: "The transaction time to evaluate the database state against. Defaults to now."}
  ];  
}

message GetNumericalParcelAttributeStatsByIdResponse {
  float mode = 1 [(buf.validate.field).float = {}];
  float minimum = 2 [(buf.validate.field).float = {}];
  float maximum = 3 [(buf.validate.field).float = {}];
  float range = 4 [(buf.validate.field).float = {}];

  float percentile_10 = 5 [(buf.validate.field).float.finite = true];
  float percentile_20 = 6 [(buf.validate.field).float.finite = true];
  float percentile_30 = 7 [(buf.validate.field).float.finite = true];
  float percentile_40 = 8 [(buf.validate.field).float.finite = true];
  float percentile_50 = 9 [(buf.validate.field).float.finite = true];
  float percentile_60 = 10 [(buf.validate.field).float.finite = true];
  float percentile_70 = 11 [(buf.validate.field).float.finite = true];
  float percentile_80 = 12 [(buf.validate.field).float.finite = true];
  float percentile_90 = 13 [(buf.validate.field).float.finite = true];
  float percentile_100 = 14 [(buf.validate.field).float.finite = true];

  float mean = 15 [(buf.validate.field).float = {}];
  float standard_deviation = 16 [(buf.validate.field).float = {}];
  float coefficient_of_dispersion = 17 [(buf.validate.field).float = {}];
}

message GetCategoricalAttributeParcelStatsByIdRequest {
  repeated string parcel_ids = 1 [
    (buf.validate.field).repeated = {
      // Enforce uniqueness at the API edge
      unique: true

      min_items: 1
      max_items: 1000

      // Apply the uuid rule to the items in the array
      items: {
        string: {uuid: true}
      }
    },

    (gnostic.openapi.v3.property) = {
      description: "A list of unique identifiers for the parcels."
      example: {yaml: "['d25f625b-4e82-4761-82ca-10dafc5dcf77', 'a11c834a-9f12-4852-9bca-32dabc5def88']"}
    }
  ];

  ParcelAttribute attribute = 2 [(buf.validate.field).enum = {
    defined_only: true,
    in: [4]
  }];

  // The historical or future effective date the user wants to view.
  // If omitted, defaults to the current time.
  optional google.protobuf.Timestamp legal_as_of = 3 [
    (buf.validate.field).timestamp = {
      // Bounded to prevent integer overflow or absurd historical queries
      gt: {seconds: -62135596800} /* Approx Jan 1, 0 CE */
    },
    (gnostic.openapi.v3.property) = {description: "The real-world date to evaluate the parcel against. Defaults to now."}
  ];

  // The time to reset the database state to
  // If omitted, defaults to the current time.
  optional google.protobuf.Timestamp system_as_of = 4 [
    (buf.validate.field).timestamp = {
      // From the Unix Epoch till now
      gt: {seconds: -1}
      lt_now: true
    },
    (gnostic.openapi.v3.property) = {description: "The transaction time to evaluate the database state against. Defaults to now."}
  ];  
}

message GetCategoricalAttributeParcelStatsByIdResponse {
  string mode = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];

  map<string, int32> unique_values = 2 [(buf.validate.field).map = {
    min_pairs: 1 // Require at least one entry (prevents empty objects)
    max_pairs: 50 // Prevent "unbounded" objects that could crash your DB

    // Validate the keys (Strings)
    keys: {
      string: {
        min_len: 1
        max_len: 256
      }
    }

    // Validate the values (Integers)
    values: {
      int32: {
        gte: 0 // Example: Ensure values are non-negative
      }
    }
  }];
}

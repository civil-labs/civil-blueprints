syntax = "proto3";

package civil.public.tiles.v1;

import "google/api/annotations.proto";

service TileService {
  rpc GetParcelTiles(GetParcelTilesRequest) returns (GetParcelTilesResponse) {
    option (google.api.http) = {get: "/tiles/get_parcel_tiles/{z}/{x}/{y}"};
  }
}

message GetParcelTilesRequest {
  int32 z = 1;
  int32 x = 2;
  int32 y = 3;
}

message GetParcelTilesResponse {
  string content_type = 1;
  bytes data = 2;
}

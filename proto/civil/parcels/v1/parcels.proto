syntax = "proto3";

package civil.parcels.v1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/civil-labs/civil-api-go/civil/parcels/v1;parcelsv1";
option (gnostic.openapi.v3.document) = {
  info: {
    title: "Civil API"
    version: "0.0.1"
    description: "API description for the Civil platform. Auth token can be retrieved by prefixing \"auth-\" to the beginning of your jurisdiction's endpoint."
  }

  components: {
    security_schemes: {
      additional_properties: [
        {
          name: "BearerAuth"
          value: {
            security_scheme: {
              type: "http"
              scheme: "bearer"
              bearer_format: "JWT"
            }
          }
        }
      ]
    }
  }

  servers: [
    {url: "https://leepa.civillabs.app"}]
};

service ParcelService {
  // Updates a specified attribute for one or more parcels, identified by their parcel IDs.
  rpc UpdateParcelAttribute(UpdateParcelAttributeRequest) returns (UpdateParcelAttributeResponse) {}

  // Retrieves all details about a parcel in a JSON object.
  rpc GetParcel(GetParcelRequest) returns (GetParcelResponse) {}

  // Retrieves a specified attribute value for a given parcel.
  rpc GetParcelAttribute(GetParcelAttributeRequest) returns (GetParcelAttributeResponse) {}
}

message UpdateParcelAttributeRequest {
  repeated string parcel_ids = 1 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 1000
    items: {
      string: {
        min_len: 1
        max_len: 256
      }
    }
  }];

  string attribute_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];

  string attribute_value = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];
}

message UpdateParcelAttributeResponse {}

message GetParcelRequest {
  string parcel_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];
}

message GetParcelResponse {
  google.protobuf.Struct parcel_details = 1;
}

message GetParcelAttributeRequest {
  string parcel_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];

  string attribute_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];
}

message GetParcelAttributeResponse {
  string attribute_value = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];
}
